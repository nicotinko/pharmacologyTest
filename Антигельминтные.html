<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Противоглистные препараты — тест</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --ok-bg: #ecfdf5;
      --ok-border: #10b981;
      --bad-bg: #fef2f2;
      --bad-border: #ef4444;
      --picked-bg: #eff6ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 24px 16px 48px; }
    .hero, .question, .results { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06); }
    .hero { padding: 24px; margin-bottom: 20px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .muted { color: var(--muted); }
    .question { padding: 20px; margin-bottom: 16px; }
    .qtitle { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .qmeta { font-size: 14px; color: var(--muted); margin-bottom: 14px; }
    .options { display: grid; gap: 10px; }
    label.option { display: flex; gap: 12px; align-items: flex-start; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; background: #fff; cursor: pointer; }
    label.option:hover { background: #f9fafb; }
    label.option input { margin-top: 3px; }
    label.option.selected { background: var(--picked-bg); }
    label.option.correct { background: var(--ok-bg); border-color: var(--ok-border); }
    label.option.incorrect { background: var(--bad-bg); border-color: var(--bad-border); }
    .explain { margin-top: 14px; border-top: 1px dashed var(--border); padding-top: 12px; }
    .explain summary { cursor: pointer; color: var(--accent); font-weight: 600; }
    .explain .box { margin-top: 10px; padding: 12px 14px; border-radius: 12px; background: var(--accent-soft); color: #1e3a8a; }
    .toolbar { position: sticky; bottom: 0; background: rgba(246,247,251,.92); backdrop-filter: blur(8px); padding-top: 12px; margin-top: 24px; }
    .toolbar-inner { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    button { border: 0; border-radius: 12px; padding: 12px 16px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .primary { background: var(--accent); color: white; }
    .secondary { background: white; border: 1px solid var(--border); color: var(--text); }
    .results { display: none; padding: 18px 20px; margin-top: 18px; }
    .results.show { display: block; }
    .score { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    code.inline { font-size: 13px; background: #eef2ff; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Противоглистные препараты</h1>
      <p class="muted">Исправленная версия теста: спорные формулировки уточнены, а под каждым вопросом добавлено раскрывающееся пояснение.</p>
      <p class="muted">Пояснение открывается после проверки, чтобы студент сначала попытался ответить самостоятельно.</p>
    </section>
    <div id="quiz"></div>
    <section id="results" class="results" aria-live="polite"></section>
    <div class="toolbar">
      <div class="toolbar-inner">
        <button id="checkBtn" class="primary">Проверить</button>
        <button id="resetBtn" class="secondary" type="button">Сбросить</button>
        <span class="muted">Файл автономный: один <code class="inline">.html</code>, без backend.</span>
      </div>
    </div>
  </div>
  <script id="quiz-data" type="application/json">{"title": "Противоглистные препараты", "questions": [{"id": 1, "question": "Препараты, нарушающие нервно-мышечную систему у круглых червей (нематод)", "multi": true, "explanation": "Пирантел, пиперазина адипинат и левамизол относятся к средствам, нарушающим нервно-мышечную передачу у нематод. Албендазол и мебендазол в основном относят к препаратам, нарушающим метаболические и энергетические процессы гельминтов.", "options": [{"id": 1, "text": "пирантел", "correct": true}, {"id": 2, "text": "левамизол", "correct": true}, {"id": 3, "text": "албендазол", "correct": false}, {"id": 4, "text": "пиперазина адипинат", "correct": true}, {"id": 5, "text": "мебендазол", "correct": false}]}, {"id": 2, "question": "Препараты, блокирующие энергетические процессы гельминтов", "multi": true, "explanation": "Албендазол и мебендазол — бензимидазолы, нарушающие утилизацию глюкозы и другие метаболические процессы гельминтов. В ряде учебных классификаций сюда также относят левамизол, но в этом наборе ответов он не предложен как основной правильный вариант.", "options": [{"id": 1, "text": "албендазол", "correct": true}, {"id": 2, "text": "мебендазол", "correct": true}, {"id": 3, "text": "пирантел", "correct": false}, {"id": 4, "text": "празиквантел", "correct": false}]}, {"id": 3, "question": "Препараты, эффективные для лечения энтеробиоза и аскаридоза", "multi": true, "explanation": "Пирантел и пиперазина адипинат традиционно применяются при энтеробиозе и аскаридозе. Метронидазол не относится к антигельминтным средствам, а празиквантел используют преимущественно при цестодозах и трематодозах.", "options": [{"id": 1, "text": "празиквантел", "correct": false}, {"id": 2, "text": "метронидазол", "correct": false}, {"id": 3, "text": "пирантел", "correct": true}, {"id": 4, "text": "пиперазина адипинат", "correct": true}]}, {"id": 4, "question": "Препараты, применяемые при цестодозах", "multi": true, "explanation": "Празиквантел — один из основных препаратов при цестодозах. Албендазол также применяют при некоторых цестодозах, особенно тканевых формах, поэтому более корректно формулировать вопрос широко — не только про кишечные цестодозы.", "options": [{"id": 1, "text": "празиквантел", "correct": true}, {"id": 2, "text": "левамизол", "correct": false}, {"id": 3, "text": "албендазол", "correct": true}, {"id": 4, "text": "пирантел", "correct": false}]}, {"id": 5, "question": "Показание к левамизолу", "multi": false, "explanation": "Левамизол применяют прежде всего при нематодозах, в том числе при аскаридозе. Для цестодозов, трематодозов и шистосомозов он не является препаратом выбора.", "options": [{"id": 1, "text": "аскаридоз", "correct": true}, {"id": 2, "text": "цестодоз", "correct": false}, {"id": 3, "text": "трематодоз", "correct": false}, {"id": 4, "text": "шистосомоз", "correct": false}]}, {"id": 6, "question": "Препарат, повышающий проницаемость мембран к Ca2+, вызывающий паралич червей и повреждающий их покровы", "multi": false, "explanation": "Празиквантел повышает проницаемость мембран клеток гельминтов для ионов кальция, что вызывает стойкое сокращение мускулатуры, паралич и повреждение покровов паразита.", "options": [{"id": 1, "text": "мебендазол", "correct": false}, {"id": 2, "text": "пирантел", "correct": false}, {"id": 3, "text": "празиквантел", "correct": true}, {"id": 4, "text": "левамизол", "correct": false}]}, {"id": 7, "question": "Противоглистный препарат, обладающий иммуномодулирующими свойствами", "multi": false, "explanation": "Левамизол помимо антигельминтного действия известен как препарат с иммуномодулирующими свойствами. Именно поэтому этот вопрос в фармакологии обычно связывают с левамизолом.", "options": [{"id": 1, "text": "мебендазол", "correct": false}, {"id": 2, "text": "левамизол", "correct": true}, {"id": 3, "text": "пиперазина адипинат", "correct": false}, {"id": 4, "text": "пирантел", "correct": false}]}]}</script>
  <script>
    const data = JSON.parse(document.getElementById('quiz-data').textContent);
    const quizEl = document.getElementById('quiz');
    const resultsEl = document.getElementById('results');

    function renderQuiz() {
      quizEl.innerHTML = '';
      data.questions.forEach((q, qIndex) => {
        const card = document.createElement('section');
        card.className = 'question';
        const correctCount = q.options.filter(o => o.correct).length;
        const type = q.multi ? 'checkbox' : 'radio';
        card.innerHTML = `
          <div class="qtitle">${qIndex + 1}. ${q.question}</div>
          <div class="qmeta">${q.multi ? `Несколько правильных ответов: ${correctCount}` : 'Один правильный ответ'}</div>
          <div class="options">
            ${q.options.map(opt => `
              <label class="option" data-correct="${opt.correct}">
                <input type="${type}" name="q-${q.id}" value="${opt.id}">
                <span>${opt.id}. ${opt.text}</span>
              </label>
            `).join('')}
          </div>
          <details class="explain" hidden>
            <summary>Пояснение</summary>
            <div class="box">${q.explanation}</div>
          </details>
        `;
        quizEl.appendChild(card);
      });
      bindSelectionHighlight();
    }

    function bindSelectionHighlight() {
      document.querySelectorAll('.option input').forEach(input => {
        input.addEventListener('change', () => {
          const name = input.name;
          document.querySelectorAll(`input[name="${name}"]`).forEach(el => {
            el.closest('.option').classList.toggle('selected', el.checked);
          });
        });
      });
    }

    function arraysEqual(a, b) {
      return a.length === b.length && a.every((v, i) => v === b[i]);
    }

    function checkAnswers() {
      let correctQuestions = 0;
      data.questions.forEach(q => {
        const selected = [...document.querySelectorAll(`input[name="q-${q.id}"]:checked`)].map(i => Number(i.value)).sort((a, b) => a - b);
        const correct = q.options.filter(o => o.correct).map(o => o.id).sort((a, b) => a - b);
        if (arraysEqual(selected, correct)) correctQuestions += 1;
        document.querySelectorAll(`input[name="q-${q.id}"]`).forEach(input => {
          const label = input.closest('.option');
          const shouldBeChecked = label.dataset.correct === 'true';
          label.classList.remove('correct', 'incorrect');
          if (shouldBeChecked) label.classList.add('correct');
          if (input.checked && !shouldBeChecked) label.classList.add('incorrect');
        });
        const details = document.querySelector(`input[name="q-${q.id}"]`).closest('.question').querySelector('.explain');
        details.hidden = false;
      });
      const percent = Math.round((correctQuestions / data.questions.length) * 100);
      resultsEl.classList.add('show');
      resultsEl.innerHTML = `
        <div class="score">Результат: ${correctQuestions} из ${data.questions.length} (${percent}%)</div>
        <div class="muted">Зелёным отмечены правильные ответы, красным — ошибочно выбранные. После проверки под каждым вопросом доступно пояснение.</div>
      `;
      resultsEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function resetQuiz() {
      document.querySelectorAll('input').forEach(input => input.checked = false);
      document.querySelectorAll('.option').forEach(label => label.classList.remove('selected', 'correct', 'incorrect'));
      document.querySelectorAll('.explain').forEach(d => { d.hidden = true; d.open = false; });
      resultsEl.classList.remove('show');
      resultsEl.innerHTML = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('checkBtn').addEventListener('click', checkAnswers);
    document.getElementById('resetBtn').addEventListener('click', resetQuiz);
    renderQuiz();
  </script>
</body>
</html>
